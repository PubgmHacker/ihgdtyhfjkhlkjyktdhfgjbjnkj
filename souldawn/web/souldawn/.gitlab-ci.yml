# SOULDAWN CI — проверка сборки web (Next.js + Prisma) и smoke-проверка bot (Python).
# Запускается на merge request'ах и на main.

stages:
  - build

# ─── Web: Next.js + Prisma ──────────────────────────────────────
web:build:
  stage: build
  image: node:20-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  variables:
    # Build-time заглушки: prisma generate не ходит в БД, next build не требует живых секретов.
    DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
    JWT_SECRET: "ci-dummy-secret"
    TELEGRAM_BOT_TOKEN: "ci:dummy"
    NEXT_TELEMETRY_DISABLED: "1"
  cache:
    key:
      files:
        - web/package-lock.json
    paths:
      - web/node_modules/
  script:
    - cd web
    - npm ci
    - npx prisma generate
    - npm run lint
    - npm run build

# ─── Bot: Python syntax + deps ─────────────────────────────────
bot:check:
  stage: build
  image: python:3.12-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  cache:
    key:
      files:
        - bot/requirements.txt
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  script:
    - cd bot
    - pip install -r requirements.txt
    - python -m compileall -q .
